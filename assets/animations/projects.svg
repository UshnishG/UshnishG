<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F8CFF" />
      <stop offset="100%" stop-color="#7B61FF" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#4F8CFF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;700&amp;family=Space+Grotesk:wght@500;700&amp;display=swap');
    
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    .mono {
      font-family: 'JetBrains Mono', monospace;
    }
    .grotesk {
      font-family: 'Space Grotesk', sans-serif;
    }
    
  .card-bg {
    fill: #161B22;
    stroke: #30363D;
    stroke-width: 1;
    rx: 12;
    transition: all 0.3s ease;
  }
  .card:hover .card-bg {
    stroke: url(#primaryGrad);
    filter: url(#glow);
  }
  .title {
    font-size: 18px;
    font-weight: 700;
    fill: #FFFFFF;
  }
  .desc {
    font-size: 14px;
    fill: #8B949E;
  }
  .tag-bg {
    fill: #21262D;
    rx: 4;
  }
  .tag-text {
    font-size: 11px;
    fill: #00E5FF;
  }

  </style>
  <rect width="100%" height="100%" fill="#0B0F19" rx="12" />
  <g>
    <g class="card" transform="translate(0, 0)">
      <rect class="card-bg" x="10" y="10" width="380" height="170" />
      <text class="grotesk title" x="30" y="50">Backend-DMIND</text>
      <foreignObject x="30" y="70" width="340" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml" style="color: #8B949E; font-size: 14px; font-family: 'Inter', sans-serif;">
          AI/ML & Edge System Architecture. Payload routing pipelines.
        </div>
      </foreignObject>
      
      <rect class="tag-bg" x="30" y="140" width="60" height="22" />
      <text class="mono tag-text" x="60" y="155" text-anchor="middle">Python</text>
    
      <rect class="tag-bg" x="100" y="140" width="60" height="22" />
      <text class="mono tag-text" x="130" y="155" text-anchor="middle">AI/ML</text>
    
      <rect class="tag-bg" x="170" y="140" width="60" height="22" />
      <text class="mono tag-text" x="200" y="155" text-anchor="middle">Edge</text>
    
    </g>
  
    <g class="card" transform="translate(0, 0)">
      <rect class="card-bg" x="400" y="10" width="380" height="170" />
      <text class="grotesk title" x="420" y="50">Synapse-AI</text>
      <foreignObject x="420" y="70" width="340" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml" style="color: #8B949E; font-size: 14px; font-family: 'Inter', sans-serif;">
          1st Prize Hackathon winner. Intelligent recruitment assistant.
        </div>
      </foreignObject>
      
      <rect class="tag-bg" x="420" y="140" width="60" height="22" />
      <text class="mono tag-text" x="450" y="155" text-anchor="middle">TypeScript</text>
    
      <rect class="tag-bg" x="490" y="140" width="60" height="22" />
      <text class="mono tag-text" x="520" y="155" text-anchor="middle">LLM</text>
    
      <rect class="tag-bg" x="560" y="140" width="60" height="22" />
      <text class="mono tag-text" x="590" y="155" text-anchor="middle">React</text>
    
    </g>
  
    <g class="card" transform="translate(0, 0)">
      <rect class="card-bg" x="10" y="200" width="380" height="170" />
      <text class="grotesk title" x="30" y="240">Neural-Core</text>
      <foreignObject x="30" y="260" width="340" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml" style="color: #8B949E; font-size: 14px; font-family: 'Inter', sans-serif;">
          Distributed training framework for custom transformer models.
        </div>
      </foreignObject>
      
      <rect class="tag-bg" x="30" y="330" width="60" height="22" />
      <text class="mono tag-text" x="60" y="345" text-anchor="middle">Rust</text>
    
      <rect class="tag-bg" x="100" y="330" width="60" height="22" />
      <text class="mono tag-text" x="130" y="345" text-anchor="middle">CUDA</text>
    
      <rect class="tag-bg" x="170" y="330" width="60" height="22" />
      <text class="mono tag-text" x="200" y="345" text-anchor="middle">Python</text>
    
    </g>
  
    <g class="card" transform="translate(0, 0)">
      <rect class="card-bg" x="400" y="200" width="380" height="170" />
      <text class="grotesk title" x="420" y="240">IEEE-Portal</text>
      <foreignObject x="420" y="260" width="340" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml" style="color: #8B949E; font-size: 14px; font-family: 'Inter', sans-serif;">
          Official portal for IEEE Computer Society AICSSYC 2026.
        </div>
      </foreignObject>
      
      <rect class="tag-bg" x="420" y="330" width="60" height="22" />
      <text class="mono tag-text" x="450" y="345" text-anchor="middle">Next.js</text>
    
      <rect class="tag-bg" x="490" y="330" width="60" height="22" />
      <text class="mono tag-text" x="520" y="345" text-anchor="middle">Tailwind</text>
    
      <rect class="tag-bg" x="560" y="330" width="60" height="22" />
      <text class="mono tag-text" x="590" y="345" text-anchor="middle">Go</text>
    
    </g>
  </g>
</svg>