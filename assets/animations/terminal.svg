<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="800" height="250">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F8CFF" />
      <stop offset="100%" stop-color="#7B61FF" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#4F8CFF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;700&amp;family=Space+Grotesk:wght@500;700&amp;display=swap');
    
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    .mono {
      font-family: 'JetBrains Mono', monospace;
    }
    .grotesk {
      font-family: 'Space Grotesk', sans-serif;
    }
    
  .term-bg {
    fill: #0D1117;
    stroke: #30363D;
    stroke-width: 1;
    rx: 8;
  }
  .term-header {
    fill: #161B22;
  }
  .term-text {
    font-size: 14px;
    fill: #FFFFFF;
  }
  .prompt {
    fill: #00E5FF;
    font-weight: bold;
  }
  .success { fill: #3DDC97; }
  .cursor {
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  
  .cmd1 { opacity: 0; animation: showCmd 0.1s forwards 1s; }
  .res1 { opacity: 0; animation: showCmd 0.1s forwards 1.5s; }
  
  .cmd2 { opacity: 0; animation: showCmd 0.1s forwards 3s; }
  .res2 { opacity: 0; animation: showCmd 0.1s forwards 3.5s; }
  
  .cmd3 { opacity: 0; animation: showCmd 0.1s forwards 5s; }
  .res3 { opacity: 0; animation: showCmd 0.1s forwards 5.5s; }
  
  .cmd4 { opacity: 0; animation: showCmd 0.1s forwards 7s; }
  .res4 { opacity: 0; animation: showCmd 0.1s forwards 7.5s; }

  @keyframes showCmd {
    to { opacity: 1; }
  }

  </style>
  <rect width="100%" height="100%" fill="#0B0F19" rx="12" />
  
  <g transform="translate(100, 20)">
    <rect class="term-bg" x="0" y="0" width="600" height="200" />
    <path class="term-header" d="M 0 8 a 8 8 0 0 1 8 -8 h 584 a 8 8 0 0 1 8 8 v 22 h -600 z" />
    <circle cx="20" cy="15" r="6" fill="#FF5C7A" />
    <circle cx="40" cy="15" r="6" fill="#F5B841" />
    <circle cx="60" cy="15" r="6" fill="#3DDC97" />
    <text class="mono" x="300" y="20" fill="#8B949E" font-size="12" text-anchor="middle">ushnish@ai-core: ~</text>
    
    <g class="mono term-text" transform="translate(20, 60)">
      <text class="cmd1"><tspan class="prompt">ushnish@ai-core:~$</tspan> whoami</text>
      <text class="res1" y="25" fill="#7B61FF">Ushnish Ghosal - AI Engineer & Researcher</text>
      
      <text class="cmd2" y="55"><tspan class="prompt">ushnish@ai-core:~$</tspan> ./show_skills.sh</text>
      <text class="res2 success" y="80">[+] Python [+] Rust [+] LLMs [+] Edge AI</text>
      
      <text class="cmd3" y="110"><tspan class="prompt">ushnish@ai-core:~$</tspan> cat vision.txt</text>
      <text class="res3" y="135" fill="#8B949E">"Building scalable, intelligent systems for the future."</text>
      
      <text class="cmd4" y="165"><tspan class="prompt">ushnish@ai-core:~$</tspan> <tspan class="cursor" fill="#FFFFFF">█</tspan></text>
    </g>
  </g>

</svg>