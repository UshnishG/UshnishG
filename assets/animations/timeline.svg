<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F8CFF" />
      <stop offset="100%" stop-color="#7B61FF" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#4F8CFF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;700&amp;family=Space+Grotesk:wght@500;700&amp;display=swap');
    
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    .mono {
      font-family: 'JetBrains Mono', monospace;
    }
    .grotesk {
      font-family: 'Space Grotesk', sans-serif;
    }
    
  .timeline-line {
    stroke: #30363D;
    stroke-width: 4;
  }
  .timeline-progress {
    stroke: url(#primaryGrad);
    stroke-width: 4;
    stroke-dasharray: 800;
    stroke-dashoffset: 800;
    animation: draw-line 2s ease-out forwards;
  }
  .node {
    fill: #161B22;
    stroke: #4F8CFF;
    stroke-width: 3;
    animation: pop-node 0.5s ease-out backwards;
  }
  .year {
    font-size: 14px;
    fill: #00E5FF;
    font-weight: 700;
  }
  .title {
    font-size: 12px;
    fill: #8B949E;
  }
  @keyframes draw-line {
    to { stroke-dashoffset: 0; }
  }
  @keyframes pop-node {
    0% { transform: scale(0); }
    80% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  </style>
  <rect width="100%" height="100%" fill="#0B0F19" rx="12" />
  
  <g transform="translate(50, 100)">
    <line class="timeline-line" x1="0" y1="0" x2="700" y2="0" />
    <line class="timeline-progress" x1="0" y1="0" x2="700" y2="0" />

    <g transform="translate(0, 0)" style="animation-delay: 0s">
      <circle class="node" cx="0" cy="0" r="8" style="animation-delay: 0s" />
      <text class="mono year" x="0" y="-20" text-anchor="middle" style="opacity:0; animation: reveal 0.5s forwards 0.2s">2020</text>
      <text class="grotesk title" x="0" y="25" text-anchor="middle" style="opacity:0; animation: reveal 0.5s forwards 0.3s">Started Programming</text>
    </g>
  
    <g transform="translate(175, 0)" style="animation-delay: 0.4s">
      <circle class="node" cx="0" cy="0" r="8" style="animation-delay: 0.4s" />
      <text class="mono year" x="0" y="-20" text-anchor="middle" style="opacity:0; animation: reveal 0.5s forwards 0.6000000000000001s">2023</text>
      <text class="grotesk title" x="0" y="25" text-anchor="middle" style="opacity:0; animation: reveal 0.5s forwards 0.7s">Joined SRMIST</text>
    </g>
  
    <g transform="translate(350, 0)" style="animation-delay: 0.8s">
      <circle class="node" cx="0" cy="0" r="8" style="animation-delay: 0.8s" />
      <text class="mono year" x="0" y="-20" text-anchor="middle" style="opacity:0; animation: reveal 0.5s forwards 1s">2024</text>
      <text class="grotesk title" x="0" y="25" text-anchor="middle" style="opacity:0; animation: reveal 0.5s forwards 1.1s">Hackathon Wins</text>
    </g>
  
    <g transform="translate(525, 0)" style="animation-delay: 1.2000000000000002s">
      <circle class="node" cx="0" cy="0" r="8" style="animation-delay: 1.2000000000000002s" />
      <text class="mono year" x="0" y="-20" text-anchor="middle" style="opacity:0; animation: reveal 0.5s forwards 1.4000000000000001s">2025</text>
      <text class="grotesk title" x="0" y="25" text-anchor="middle" style="opacity:0; animation: reveal 0.5s forwards 1.5000000000000002s">Synapse Recruiter 1st</text>
    </g>
  
    <g transform="translate(700, 0)" style="animation-delay: 1.6s">
      <circle class="node" cx="0" cy="0" r="8" style="animation-delay: 1.6s" />
      <text class="mono year" x="0" y="-20" text-anchor="middle" style="opacity:0; animation: reveal 0.5s forwards 1.8s">2026</text>
      <text class="grotesk title" x="0" y="25" text-anchor="middle" style="opacity:0; animation: reveal 0.5s forwards 1.9000000000000001s">IEEE Chair</text>
    </g>
  
  </g>
  <style>
    @keyframes reveal { to { opacity: 1; } }
  </style>

</svg>