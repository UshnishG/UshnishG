<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F8CFF" />
      <stop offset="100%" stop-color="#7B61FF" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#4F8CFF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;700&amp;family=Space+Grotesk:wght@500;700&amp;display=swap');
    
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    .mono {
      font-family: 'JetBrains Mono', monospace;
    }
    .grotesk {
      font-family: 'Space Grotesk', sans-serif;
    }
    
  .stat-box {
    fill: #161B22;
    stroke: #30363D;
    rx: 8;
  }
  .stat-val {
    font-size: 32px;
    font-weight: 700;
    fill: url(#primaryGrad);
  }
  .stat-label {
    font-size: 14px;
    fill: #8B949E;
  }

  </style>
  <rect width="100%" height="100%" fill="#0B0F19" rx="12" />
  <g transform="translate(10, 20)">
      <g transform="translate(0, 0)">
        <rect class="stat-box" x="0" y="0" width="145" height="120" />
        <text class="mono stat-val" x="72.5" y="65" text-anchor="middle">124</text>
        <text class="grotesk stat-label" x="72.5" y="95" text-anchor="middle">Total Stars</text>
      </g>
    
      <g transform="translate(155, 0)">
        <rect class="stat-box" x="0" y="0" width="145" height="120" />
        <text class="mono stat-val" x="72.5" y="65" text-anchor="middle">1042</text>
        <text class="grotesk stat-label" x="72.5" y="95" text-anchor="middle">Commits</text>
      </g>
    
      <g transform="translate(310, 0)">
        <rect class="stat-box" x="0" y="0" width="145" height="120" />
        <text class="mono stat-val" x="72.5" y="65" text-anchor="middle">125k</text>
        <text class="grotesk stat-label" x="72.5" y="95" text-anchor="middle">Lines Added</text>
      </g>
    
      <g transform="translate(465, 0)">
        <rect class="stat-box" x="0" y="0" width="145" height="120" />
        <text class="mono stat-val" x="72.5" y="65" text-anchor="middle">55</text>
        <text class="grotesk stat-label" x="72.5" y="95" text-anchor="middle">Followers</text>
      </g>
    
      <g transform="translate(620, 0)">
        <rect class="stat-box" x="0" y="0" width="145" height="120" />
        <text class="mono stat-val" x="72.5" y="65" text-anchor="middle">45</text>
        <text class="grotesk stat-label" x="72.5" y="95" text-anchor="middle">Repositories</text>
      </g>
    </g>
</svg>