<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F8CFF" />
      <stop offset="100%" stop-color="#7B61FF" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#4F8CFF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;700&amp;family=Space+Grotesk:wght@500;700&amp;display=swap');
    
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    .mono {
      font-family: 'JetBrains Mono', monospace;
    }
    .grotesk {
      font-family: 'Space Grotesk', sans-serif;
    }
    
  .skill-bg {
    fill: #161B22;
    rx: 6;
  }
  .skill-fill {
    fill: url(#accentGrad);
    rx: 6;
    animation: load-bar 1.5s ease-out forwards;
  }
  .skill-text {
    font-size: 14px;
    fill: #FFFFFF;
    font-weight: 500;
  }
  .skill-percent {
    font-size: 12px;
    fill: #8B949E;
  }
  @keyframes load-bar {
    from { width: 0; }
  }

  </style>
  <rect width="100%" height="100%" fill="#0B0F19" rx="12" />
  <g transform="translate(40, 40)">
    <text class="grotesk skill-text" x="0" y="14">Artificial Intelligence</text>
    <rect class="skill-bg" x="200" y="0" width="500" height="12" />
    <rect class="skill-fill" x="200" y="0" width="475" height="12" />
    <text class="mono skill-percent" x="720" y="12">95%</text>
  
    <text class="grotesk skill-text" x="0" y="56">LLMs & GenAI</text>
    <rect class="skill-bg" x="200" y="42" width="500" height="12" />
    <rect class="skill-fill" x="200" y="42" width="450" height="12" />
    <text class="mono skill-percent" x="720" y="54">90%</text>
  
    <text class="grotesk skill-text" x="0" y="98">Python</text>
    <rect class="skill-bg" x="200" y="84" width="500" height="12" />
    <rect class="skill-fill" x="200" y="84" width="475" height="12" />
    <text class="mono skill-percent" x="720" y="96">95%</text>
  
    <text class="grotesk skill-text" x="0" y="140">Backend</text>
    <rect class="skill-bg" x="200" y="126" width="500" height="12" />
    <rect class="skill-fill" x="200" y="126" width="425" height="12" />
    <text class="mono skill-percent" x="720" y="138">85%</text>
  
    <text class="grotesk skill-text" x="0" y="182">TypeScript</text>
    <rect class="skill-bg" x="200" y="168" width="500" height="12" />
    <rect class="skill-fill" x="200" y="168" width="400" height="12" />
    <text class="mono skill-percent" x="720" y="180">80%</text>
  
    <text class="grotesk skill-text" x="0" y="224">C/C++</text>
    <rect class="skill-bg" x="200" y="210" width="500" height="12" />
    <rect class="skill-fill" x="200" y="210" width="425" height="12" />
    <text class="mono skill-percent" x="720" y="222">85%</text>
  
    <text class="grotesk skill-text" x="0" y="266">Rust & Go</text>
    <rect class="skill-bg" x="200" y="252" width="500" height="12" />
    <rect class="skill-fill" x="200" y="252" width="375" height="12" />
    <text class="mono skill-percent" x="720" y="264">75%</text>
  
    <text class="grotesk skill-text" x="0" y="308">Cloud & DevOps</text>
    <rect class="skill-bg" x="200" y="294" width="500" height="12" />
    <rect class="skill-fill" x="200" y="294" width="400" height="12" />
    <text class="mono skill-percent" x="720" y="306">80%</text>
  </g>
</svg>